<!DOCTYPE html>

<head>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

<body onload="nav(), footer()">
    <section class="sect_height_book sect">
        <div class="container text-center">
            <h1>Foglalás</h1>
            <div class="row">
                <div class="col text-center">
                    <h3>Válasszon időpontot:</h3>
                    <label>Bejelentkezés:</label>
                    <input type="date">
                    <label id="kij">Kijelentkezés:</label>
                    <input type="date">
                    <h3 class="mt-5">Válasszon szobát:</h3>
                    <select>
                        <option></option>
                    </select>
                    <h1 class="mt-5">Személyes adatok</h1>
                    <h5>Teljes név:</h5>
                    <input type="text" placeholder="Vezetéknév">
                    <input type="text" placeholder="Keresztnév">
                    <br>
                    <h5>E-mail cím:</h5>
                    <input type="email" placeholder="minta@cim.hu">
                    <br>
                    <h5>Telefonszám:</h5>
                    <input type="tel" placeholder="06-50-123-4567">
                    <br>
                    <button class="btn btn-primary">Foglalás</button>
                </div>
                <div class="col text-center" id="szobaadatok">
                    <h3>A szoba adatai:</h3>
                    <h5 id="warn">Ön még nem választott szobát!</h5>
                </div>
            </div>
        </div>
    </section>
    <asd></asd>
